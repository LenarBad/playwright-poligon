<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training App - Cart</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-row">
        <nav class="nav" aria-label="Main navigation">
          <a data-nav href="index.html">Catalog</a>
          <a data-nav data-nav-auth href="login.html">Login</a>
          <a data-nav href="cart.html">Cart</a>
          <a data-nav href="profile.html">Profile</a>
          <a data-nav href="work-hours.html">Work Hours</a>
        </nav>
        <div class="header-meta">
          <img
            class="header-avatar"
            src="./assets/images/profile_picture.png"
            alt="User avatar"
            data-testid="header-avatar"
            hidden
          />
          <span class="badge" data-testid="auth-status-badge">Guest</span>
          <span class="badge">Cart: <strong data-testid="cart-count-badge">0</strong></span>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <h1>Cart</h1>
        <ul data-testid="cart-list"></ul>
        <p data-testid="cart-empty-state">Cart is empty.</p>
        <p>Total: <strong data-testid="cart-total">0 ₽</strong></p>
        <button type="button" data-testid="checkout-btn">Checkout</button>
      </section>
    </main>

    <script type="module" src="./assets/js/app.js"></script>
    <script type="module" src="./assets/js/pages/cart.js"></script>
  </body>
</html>
