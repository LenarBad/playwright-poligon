<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training App - Profile</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-row">
        <nav class="nav" aria-label="Main navigation">
          <a data-nav href="index.html">Catalog</a>
          <a data-nav data-nav-auth href="login.html">Login</a>
          <a data-nav href="cart.html">Cart</a>
          <a data-nav href="profile.html">Profile</a>
        </nav>
        <div class="header-meta">
          <span class="badge" data-testid="auth-status-badge">Guest</span>
          <span class="badge">Cart: <strong data-testid="cart-count-badge">0</strong></span>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <h1>Profile</h1>
        <p class="alert error" data-testid="auth-required-banner" hidden>
          You must sign in first.
        </p>
        <div data-testid="profile-card" hidden>
          <img
            class="profile-avatar"
            src="./assets/images/profile_picture.png"
            alt="Profile picture"
            data-testid="profile-avatar"
          />
          <p>Email: <strong data-testid="profile-email"></strong></p>
          <p>Role: <strong data-testid="profile-role"></strong></p>
          <button type="button" data-testid="logout-btn">Logout</button>
        </div>
      </section>
    </main>

    <script type="module" src="./assets/js/app.js"></script>
    <script type="module" src="./assets/js/pages/profile.js"></script>
  </body>
</html>
